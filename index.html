<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Emergencias Hospitalarias</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eef2f7;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.contenedor{
    width:100%;
    max-width:750px;
    background:white;
    border-radius:15px;
    padding:35px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#0b3d91;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#555;
    margin-bottom:30px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.grupo{
    display:flex;
    flex-direction:column;
}

.grupo-completo{
    grid-column:1 / 3;
}

label{
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

input,
select,
textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    resize:none;
    height:100px;
}

button{
    margin-top:25px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0077ff;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#005ad1;
}

.estado{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.exito{
    color:green;
}

.error{
    color:red;
}

.cargando{
    color:#ff8800;
}

@media(max-width:700px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .grupo-completo{
        grid-column:auto;
    }

}

</style>
</head>

<body>

<div class="contenedor">

    <h1>Ingreso de Emergencia</h1>

    <p class="subtitulo">
        Sistema automático de notificación para asegurados en emergencia hospitalaria
    </p>

    <form id="formulario">

        <div class="form-grid">

            <div class="grupo">
                <label>Nombre del asegurado</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="grupo">
                <label>Número de cédula</label>
                <input type="text" id="cedula" required>
            </div>

            <div class="grupo">
                <label>Número de póliza</label>
                <input type="text" id="poliza" required>
            </div>

            <div class="grupo">
                <label>Hospital</label>
                <input type="text" id="hospital" required>
            </div>

            <div class="grupo">
                <label>Área médica</label>
                <select id="area" required>
                    <option value="">Seleccione</option>
                    <option>Emergencia General</option>
                    <option>Traumatología</option>
                    <option>Cardiología</option>
                    <option>Pediatría</option>
                    <option>UCI</option>
                </select>
            </div>

            <div class="grupo">
                <label>Nivel de prioridad</label>
                <select id="prioridad" required>
                    <option value="">Seleccione</option>
                    <option>Alta</option>
                    <option>Media</option>
                    <option>Baja</option>
                </select>
            </div>

            <div class="grupo grupo-completo">
                <label>Descripción de la emergencia</label>
                <textarea id="descripcion" required></textarea>
            </div>

        </div>

        <button type="submit">
            Registrar Emergencia
        </button>

    </form>

    <div id="estado" class="estado"></div>

</div>

<script>

const formulario = document.getElementById("formulario");
const estado = document.getElementById("estado");

formulario.addEventListener("submit", async function(e){

    e.preventDefault();

    estado.innerHTML = "⏳ Enviando información...";
    estado.className = "estado cargando";

    const datos = {

        nombre: document.getElementById("nombre").value,
        cedula: document.getElementById("cedula").value,
        poliza: document.getElementById("poliza").value,
        hospital: document.getElementById("hospital").value,
        area: document.getElementById("area").value,
        prioridad: document.getElementById("prioridad").value,
        descripcion: document.getElementById("descripcion").value,
        fecha: new Date().toLocaleString()

    };

    try{

        const respuesta = await fetch(
            "https://primary-production-089e.up.railway.app/webhook/ingreso-emergencia",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(datos)
            }
        );

        if(respuesta.ok){

            estado.innerHTML =
            "✅ Emergencia registrada correctamente. El webhook fue activado.";

            estado.className = "estado exito";

            formulario.reset();

        }else{

            estado.innerHTML =
            "❌ Error al enviar los datos al servidor.";

            estado.className = "estado error";

        }

    }catch(error){

        estado.innerHTML =
        "❌ No se pudo conectar con el webhook.";

        estado.className = "estado error";

        console.error(error);

    }

});

</script>

</body>
</html>
